<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TickFlow — Precision Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #00e5ff;
      --accent2: #ff3d71;
      --accent3: #a259ff;
      --text: #e8e8f0;
      --text-dim: #6b6b80;
      --glow: 0 0 20px rgba(0,229,255,0.3);
      --font-display: 'Share Tech Mono', monospace;
      --font-ui: 'Rajdhani', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px 60px;
    }
    .header {
      width: 100%;
      max-width: 700px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--font-ui);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: var(--glow);
    }
    .logo span { color: var(--text-dim); font-weight: 300; }
    .header-actions { display: flex; gap: 10px; }
    .btn-icon {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 38px; height: 38px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); box-shadow: var(--glow); }
    .mode-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 36px;
    }
    .tab {
      padding: 8px 24px;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); box-shadow: var(--glow); }
    .main-card {
      width: 100%;
      max-width: 600px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 50px 40px 40px;
      position: relative;
      overflow: hidden;
    }
    .main-card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .time-display {
      font-family: var(--font-display);
      font-size: clamp(52px, 12vw, 86px);
      text-align: center;
      color: var(--text);
      letter-spacing: 4px;
      margin-bottom: 8px;
      transition: color 0.3s;
      line-height: 1;
    }
    .time-display.running { color: var(--accent); text-shadow: var(--glow); }
    .time-display.paused { color: var(--accent2); }
    .ms-display {
      font-family: var(--font-display);
      font-size: 28px;
      text-align: center;
      color: var(--text-dim);
      letter-spacing: 6px;
      margin-bottom: 40px;
    }
    .countdown-inputs {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 40px;
      align-items: center;
    }
    .countdown-inputs.hidden { display: none; }
    .time-input-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .time-input-wrap label { font-family: var(--font-ui); font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
    .time-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 32px;
      width: 80px;
      text-align: center;
      padding: 10px 6px;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    .time-input:focus { border-color: var(--accent); box-shadow: var(--glow); }
    .time-sep { font-family: var(--font-display); font-size: 32px; color: var(--text-dim); margin-top: 16px; }
    .controls { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
    .btn {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      padding: 14px 34px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn::after { content: ''; position: absolute; inset: 0; background: white; opacity: 0; transition: opacity 0.2s; }
    .btn:active::after { opacity: 0.1; }
    .btn-start { background: linear-gradient(135deg, var(--accent), #00b8d4); color: #000; box-shadow: 0 0 30px rgba(0,229,255,0.4); min-width: 140px; }
    .btn-start:hover { box-shadow: 0 0 50px rgba(0,229,255,0.6); transform: translateY(-1px); }
    .btn-stop { background: linear-gradient(135deg, var(--accent2), #d63031); color: #fff; box-shadow: 0 0 30px rgba(255,61,113,0.3); min-width: 140px; }
    .btn-stop:hover { box-shadow: 0 0 50px rgba(255,61,113,0.5); transform: translateY(-1px); }
    .btn-secondary { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent3); color: var(--accent3); box-shadow: 0 0 20px rgba(162,89,255,0.2); }
    .btn-lap { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-lap:hover { border-color: var(--accent); color: var(--accent); }
    .laps-section { width: 100%; max-width: 600px; margin-top: 30px; }
    .laps-header { display: flex; justify-content: space-between; align-items: center; padding: 0 4px; margin-bottom: 12px; }
    .laps-title { font-family: var(--font-ui); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); }
    .laps-clear { background: none; border: none; color: var(--text-dim); font-family: var(--font-body); font-size: 12px; cursor: pointer; transition: color 0.2s; }
    .laps-clear:hover { color: var(--accent2); }
    .laps-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; padding-right: 4px; }
    .laps-list::-webkit-scrollbar { width: 4px; }
    .laps-list::-webkit-scrollbar-track { background: transparent; }
    .laps-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .lap-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      animation: lapIn 0.3s ease;
    }
    @keyframes lapIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    .lap-item.fastest { border-color: var(--accent); }
    .lap-item.slowest { border-color: var(--accent2); }
    .lap-num { font-family: var(--font-ui); font-size: 11px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
    .lap-diff { font-family: var(--font-display); font-size: 12px; color: var(--text-dim); }
    .lap-time { font-family: var(--font-display); font-size: 16px; color: var(--text); }
    .lap-item.fastest .lap-time { color: var(--accent); }
    .lap-item.slowest .lap-time { color: var(--accent2); }
    .settings-panel { display: none; width: 100%; max-width: 600px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-top: 20px; }
    .settings-panel.open { display: block; animation: slideDown 0.3s ease; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .settings-title { font-family: var(--font-ui); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 20px; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 480px) { .settings-grid { grid-template-columns: 1fr; } }
    .setting-group { display: flex; flex-direction: column; gap: 8px; }
    .setting-label { font-family: var(--font-ui); font-size: 12px; letter-spacing: 1px; color: var(--text-dim); display: flex; justify-content: space-between; }
    .setting-label span { color: var(--accent); font-family: var(--font-display); }
    input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: var(--border); outline: none; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px rgba(0,229,255,0.5); cursor: pointer; }
    .color-row { display: flex; gap: 8px; }
    .color-swatch { width: 28px; height: 28px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .color-swatch.active { border-color: white; transform: scale(1.15); }
    .popup-trigger-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--accent3), #7c3aed); color: white; border: none; border-radius: 10px; font-family: var(--font-ui); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
    .popup-trigger-btn:hover { box-shadow: 0 0 30px rgba(162,89,255,0.5); transform: translateY(-1px); }
    .float-popup { position: fixed; z-index: 9999; border-radius: 16px; overflow: hidden; cursor: move; user-select: none; box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08); display: none; }
    .float-popup.visible { display: block; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
    .float-inner { padding: 18px 24px 14px; width: 100%; height: 100%; position: relative; }
    .float-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .float-label { font-family: var(--font-ui); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.5; color: white; }
    .float-close { background: rgba(255,255,255,0.1); border: none; color: white; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .float-close:hover { background: rgba(255,61,113,0.6); }
    .float-time { font-family: var(--font-display); text-align: center; color: white; line-height: 1; margin: 4px 0 12px; }
    .float-controls { display: flex; gap: 8px; justify-content: center; }
    .float-btn { border: none; border-radius: 20px; padding: 6px 14px; font-family: var(--font-ui); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; opacity: 0.9; }
    .float-btn:hover { opacity: 1; transform: scale(1.05); }
    .float-btn-start { background: var(--accent); color: #000; }
    .float-btn-stop { background: var(--accent2); color: #fff; }
    .float-btn-reset { background: rgba(255,255,255,0.15); color: white; }
    .resize-handle { position: absolute; bottom: 4px; right: 6px; font-size: 14px; opacity: 0.3; cursor: se-resize; color: white; line-height: 1; }
    .progress-bar { width: 100%; height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 30px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 2px; width: 100%; }
    .pulse-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); border-radius: 50%; border: 1px solid var(--accent); opacity: 0; pointer-events: none; }
    .running .pulse-ring { animation: pulseRing 2s ease-out infinite; }
    @keyframes pulseRing { 0% { width: 60px; height: 60px; opacity: 0.4; } 100% { width: 300px; height: 300px; opacity: 0; } }
    .footer { margin-top: 50px; text-align: center; font-family: var(--font-body); font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
    .footer a { color: var(--accent); text-decoration: none; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 24px; font-family: var(--font-ui); font-size: 12px; letter-spacing: 2px; color: var(--text); transition: transform 0.3s ease; z-index: 99999; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .hidden { display: none !important; }
    .kbd-hint { text-align: center; margin-top: 14px; font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
    .kbd { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; font-family: var(--font-display); font-size: 10px; }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">Tick<span>Flow</span></div>
    <div class="header-actions">
      <button class="btn-icon" id="settingsToggle" title="Settings">⚙️</button>
      <button class="btn-icon" id="popupToggle" title="Floating Popup">📌</button>
      <button class="btn-icon" id="soundToggle" title="Sound On/Off">🔔</button>
    </div>
  </header>

  <div class="mode-tabs">
    <button class="tab active" data-mode="stopwatch">Stopwatch</button>
    <button class="tab" data-mode="countdown">Countdown</button>
  </div>

  <div class="main-card" id="mainCard">
    <div class="pulse-ring" id="pulseRing"></div>
    <div id="stopwatchDisplay">
      <div class="time-display" id="timeDisplay">00:00:00</div>
      <div class="ms-display" id="msDisplay">.000</div>
    </div>
    <div class="countdown-inputs hidden" id="countdownInputs">
      <div class="time-input-wrap">
        <label>Hours</label>
        <input type="number" class="time-input" id="cdHours" value="00" min="0" max="23">
      </div>
      <div class="time-sep">:</div>
      <div class="time-input-wrap">
        <label>Minutes</label>
        <input type="number" class="time-input" id="cdMinutes" value="05" min="0" max="59">
      </div>
      <div class="time-sep">:</div>
      <div class="time-input-wrap">
        <label>Seconds</label>
        <input type="number" class="time-input" id="cdSeconds" value="00" min="0" max="59">
      </div>
    </div>
    <div class="progress-bar hidden" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="controls">
      <button class="btn btn-start" id="startBtn">▶ Start</button>
      <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
      <button class="btn btn-lap hidden" id="lapBtn">◎ Lap</button>
    </div>
    <p class="kbd-hint">
      <span class="kbd">SPACE</span> start/pause &nbsp;
      <span class="kbd">R</span> reset &nbsp;
      <span class="kbd">L</span> lap &nbsp;
      <span class="kbd">P</span> popup
    </p>
  </div>

  <div class="laps-section" id="lapsSection" style="display:none">
    <div class="laps-header">
      <span class="laps-title">Lap Times</span>
      <button class="laps-clear" id="clearLaps">Clear all</button>
    </div>
    <div class="laps-list" id="lapsList"></div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">⚙ Floating Popup Customization</div>
    <div class="settings-grid">
      <div class="setting-group">
        <div class="setting-label">Transparency <span id="opacityVal">85%</span></div>
        <input type="range" id="opacitySlider" min="20" max="100" value="85">
      </div>
      <div class="setting-group">
        <div class="setting-label">Size <span id="sizeVal">Medium</span></div>
        <input type="range" id="sizeSlider" min="1" max="3" value="2" step="1">
      </div>
      <div class="setting-group">
        <div class="setting-label">Accent Color</div>
        <div class="color-row" id="colorRow">
          <div class="color-swatch active" data-color="#00e5ff" style="background:#00e5ff"></div>
          <div class="color-swatch" data-color="#ff3d71" style="background:#ff3d71"></div>
          <div class="color-swatch" data-color="#a259ff" style="background:#a259ff"></div>
          <div class="color-swatch" data-color="#00e676" style="background:#00e676"></div>
          <div class="color-swatch" data-color="#ffd600" style="background:#ffd600"></div>
          <div class="color-swatch" data-color="#ff6d00" style="background:#ff6d00"></div>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Popup Background</div>
        <div class="color-row" id="bgColorRow">
          <div class="color-swatch active" data-bg="#0d0d1a" style="background:#0d0d1a;border:1px solid #333"></div>
          <div class="color-swatch" data-bg="#1a0a0a" style="background:#1a0a0a;border:1px solid #333"></div>
          <div class="color-swatch" data-bg="#0a1a0a" style="background:#0a1a0a;border:1px solid #333"></div>
          <div class="color-swatch" data-bg="#0a0a0a" style="background:#0a0a0a;border:1px solid #444"></div>
          <div class="color-swatch" data-bg="#1e1b2e" style="background:#1e1b2e;border:1px solid #555"></div>
        </div>
      </div>
    </div>
    <button class="popup-trigger-btn" id="launchPopup">📌 Launch Floating Popup</button>
  </div>

  <div class="footer">
    TickFlow &mdash; Precision Timer &nbsp;|&nbsp; Deploy on <a href="https://netlify.com" target="_blank">Netlify</a>
  </div>
</div>

<!-- FLOATING POPUP -->
<div class="float-popup" id="floatPopup">
  <div class="float-inner" id="floatInner">
    <div class="float-topbar">
      <span class="float-label">⠿ TickFlow</span>
      <button class="float-close" id="floatClose">✕</button>
    </div>
    <div class="float-time" id="floatTime">00:00:00</div>
    <div class="float-controls">
      <button class="float-btn float-btn-start" id="floatStart">▶</button>
      <button class="float-btn float-btn-reset" id="floatReset">↺</button>
      <button class="float-btn float-btn-stop hidden" id="floatStop">⏸</button>
    </div>
    <div class="resize-handle" id="resizeHandle">⤡</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let timerInterval = null;
let startTime = null;
let elapsed = 0;
let isRunning = false;
let mode = 'stopwatch';
let laps = [];
let lastLapTime = 0;
let countdownTotal = 0;
let countdownRemaining = 0;
let soundEnabled = true;
let popupAccent = '#00e5ff';
let popupBg = '#0d0d1a';
let popupOpacity = 0.85;
let popupSize = 2;
const popupSizes = {
  1: { width: 180, fontSize: 26, padding: '14px 18px 12px' },
  2: { width: 240, fontSize: 38, padding: '18px 24px 14px' },
  3: { width: 320, fontSize: 54, padding: '22px 32px 18px' }
};

function pad(n) { return String(n).padStart(2,'0'); }
function pad3(n) { return String(n).padStart(3,'0'); }

function formatTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return { main: pad(h)+':'+pad(m)+':'+pad(s), ms: '.'+pad3(ms%1000) };
}

function getTime() { return mode === 'stopwatch' ? elapsed : countdownRemaining; }

function tick() {
  const now = Date.now();
  if (mode === 'stopwatch') {
    elapsed = now - startTime;
  } else {
    countdownRemaining = Math.max(0, countdownTotal - (now - startTime));
    if (countdownRemaining === 0) { stopTimer(); onCountdownEnd(); return; }
  }
  updateDisplays();
}

function updateDisplays() {
  const { main, ms } = formatTime(getTime());
  document.getElementById('timeDisplay').textContent = main;
  document.getElementById('msDisplay').textContent = ms;
  document.getElementById('floatTime').textContent = main;
  if (mode === 'countdown' && countdownTotal > 0) {
    document.getElementById('progressFill').style.width = (countdownRemaining / countdownTotal * 100) + '%';
  }
}

function startTimer() {
  if (isRunning) return;
  if (mode === 'countdown' && countdownRemaining === 0) {
    const h = parseInt(document.getElementById('cdHours').value)||0;
    const m = parseInt(document.getElementById('cdMinutes').value)||0;
    const s = parseInt(document.getElementById('cdSeconds').value)||0;
    countdownTotal = (h*3600+m*60+s)*1000;
    countdownRemaining = countdownTotal;
    if (!countdownTotal) { showToast('Set a time first!'); return; }
  }
  startTime = Date.now() - (mode === 'stopwatch' ? elapsed : (countdownTotal - countdownRemaining));
  isRunning = true;
  timerInterval = setInterval(tick, 50);
  document.getElementById('startBtn').textContent = '⏸ Pause';
  document.getElementById('startBtn').className = 'btn btn-stop';
  document.getElementById('timeDisplay').className = 'time-display running';
  document.getElementById('mainCard').classList.add('running');
  if (mode === 'stopwatch') document.getElementById('lapBtn').classList.remove('hidden');
  document.getElementById('floatStart').classList.add('hidden');
  document.getElementById('floatStop').classList.remove('hidden');
  if (mode === 'countdown') document.getElementById('countdownInputs').classList.add('hidden');
}

function pauseTimer() {
  if (!isRunning) return;
  clearInterval(timerInterval);
  isRunning = false;
  if (mode === 'stopwatch') elapsed = Date.now() - startTime;
  else countdownRemaining = Math.max(0, countdownTotal - (Date.now() - startTime));
  document.getElementById('startBtn').textContent = '▶ Resume';
  document.getElementById('startBtn').className = 'btn btn-start';
  document.getElementById('timeDisplay').className = 'time-display paused';
  document.getElementById('mainCard').classList.remove('running');
  document.getElementById('floatStart').classList.remove('hidden');
  document.getElementById('floatStop').classList.add('hidden');
}

function stopTimer() {
  clearInterval(timerInterval);
  isRunning = false;
  document.getElementById('startBtn').textContent = '▶ Start';
  document.getElementById('startBtn').className = 'btn btn-start';
  document.getElementById('timeDisplay').className = 'time-display';
  document.getElementById('mainCard').classList.remove('running');
  document.getElementById('lapBtn').classList.add('hidden');
  document.getElementById('floatStart').classList.remove('hidden');
  document.getElementById('floatStop').classList.add('hidden');
}

function resetTimer() {
  stopTimer();
  elapsed = 0; countdownRemaining = 0; lastLapTime = 0;
  updateDisplays();
  document.getElementById('msDisplay').textContent = '.000';
  if (mode === 'countdown') {
    document.getElementById('countdownInputs').classList.remove('hidden');
    document.getElementById('progressFill').style.width = '100%';
  }
}

function addLap() {
  if (!isRunning) return;
  const lapTime = elapsed - lastLapTime;
  lastLapTime = elapsed;
  laps.unshift({ num: laps.length + 1, time: elapsed, lapTime });
  renderLaps();
  document.getElementById('lapsSection').style.display = 'block';
}

function renderLaps() {
  const list = document.getElementById('lapsList');
  const times = laps.map(l => l.lapTime);
  const min = Math.min(...times), max = Math.max(...times);
  list.innerHTML = '';
  laps.forEach(lap => {
    const el = document.createElement('div');
    const isFast = laps.length > 1 && lap.lapTime === min;
    const isSlow = laps.length > 1 && lap.lapTime === max;
    el.className = 'lap-item' + (isFast?' fastest':isSlow?' slowest':'');
    el.innerHTML = `<span class="lap-num">Lap ${lap.num} ${isFast?'🏆':isSlow?'🐢':''}</span><span class="lap-diff">${formatTime(lap.lapTime).main}</span><span class="lap-time">${formatTime(lap.time).main}</span>`;
    list.appendChild(el);
  });
}

function onCountdownEnd() {
  if (soundEnabled) playBeep();
  showToast('⏰ Time is up!');
  if (mode === 'countdown') document.getElementById('countdownInputs').classList.remove('hidden');
}

// Popup
const popup = document.getElementById('floatPopup');
let isDragging = false, dragOffX = 0, dragOffY = 0;
let isResizing = false, resizeStartX = 0, resizeStartW = 0;

function launchPopup() {
  popup.classList.add('visible');
  popup.style.right = '30px';
  popup.style.top = '80px';
  popup.style.left = 'auto';
  applyPopupStyle();
  showToast('Popup launched — drag to move!');
}

function closePopup() { popup.classList.remove('visible'); }

function applyPopupStyle() {
  const sz = popupSizes[popupSize];
  popup.style.width = sz.width + 'px';
  popup.style.opacity = popupOpacity;
  document.getElementById('floatInner').style.background = popupBg;
  document.getElementById('floatInner').style.padding = sz.padding;
  document.getElementById('floatTime').style.fontSize = sz.fontSize + 'px';
  document.getElementById('floatStart').style.background = popupAccent;
  document.getElementById('floatStart').style.color = isLight(popupAccent) ? '#000' : '#fff';
}

function isLight(hex) {
  if (!hex.startsWith('#') || hex.length < 7) return false;
  const r = parseInt(hex.substr(1,2),16), g = parseInt(hex.substr(3,2),16), b = parseInt(hex.substr(5,2),16);
  return (r*299+g*587+b*114)/1000 > 128;
}

popup.addEventListener('mousedown', e => {
  if (e.target.id==='resizeHandle'||e.target.classList.contains('float-btn')||e.target.id==='floatClose') return;
  isDragging = true;
  const r = popup.getBoundingClientRect();
  dragOffX = e.clientX - r.left; dragOffY = e.clientY - r.top;
  popup.style.right = 'auto';
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (isDragging) {
    let x = Math.max(0, Math.min(e.clientX - dragOffX, window.innerWidth - popup.offsetWidth));
    let y = Math.max(0, Math.min(e.clientY - dragOffY, window.innerHeight - popup.offsetHeight));
    popup.style.left = x+'px'; popup.style.top = y+'px';
  }
  if (isResizing) {
    const newW = Math.max(160, Math.min(500, resizeStartW + (e.clientX - resizeStartX)));
    popup.style.width = newW+'px';
    document.getElementById('floatTime').style.fontSize = Math.round(popupSizes[popupSize].fontSize * newW/popupSizes[popupSize].width)+'px';
  }
});

document.addEventListener('mouseup', () => { isDragging = false; isResizing = false; });

popup.addEventListener('touchstart', e => {
  if (e.target.classList.contains('float-btn')||e.target.id==='floatClose') return;
  isDragging = true;
  const t = e.touches[0], r = popup.getBoundingClientRect();
  dragOffX = t.clientX - r.left; dragOffY = t.clientY - r.top;
  popup.style.right = 'auto';
},{passive:true});

document.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const t = e.touches[0];
  let x = Math.max(0,Math.min(t.clientX-dragOffX,window.innerWidth-popup.offsetWidth));
  let y = Math.max(0,Math.min(t.clientY-dragOffY,window.innerHeight-popup.offsetHeight));
  popup.style.left=x+'px'; popup.style.top=y+'px';
},{passive:true});

document.addEventListener('touchend', () => { isDragging = false; });

document.getElementById('resizeHandle').addEventListener('mousedown', e => {
  isResizing = true; resizeStartX = e.clientX; resizeStartW = popup.offsetWidth;
  e.stopPropagation(); e.preventDefault();
});

function playBeep() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,200,400].forEach(d => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, ctx.currentTime+d/1000);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+d/1000+0.4);
      o.start(ctx.currentTime+d/1000); o.stop(ctx.currentTime+d/1000+0.4);
    });
  } catch(e){}
}

let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'),2500);
}

// Events
document.getElementById('startBtn').addEventListener('click', () => isRunning ? pauseTimer() : startTimer());
document.getElementById('resetBtn').addEventListener('click', () => { resetTimer(); laps=[]; document.getElementById('lapsSection').style.display='none'; document.getElementById('lapsList').innerHTML=''; });
document.getElementById('lapBtn').addEventListener('click', addLap);
document.getElementById('clearLaps').addEventListener('click', () => { laps=[]; document.getElementById('lapsList').innerHTML=''; document.getElementById('lapsSection').style.display='none'; });
document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
  if (isRunning) { showToast('Stop the timer first'); return; }
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active'); mode = tab.dataset.mode; resetTimer();
  if (mode==='countdown') { document.getElementById('countdownInputs').classList.remove('hidden'); document.getElementById('progressBar').classList.remove('hidden'); document.getElementById('lapBtn').classList.add('hidden'); document.getElementById('msDisplay').style.display='none'; }
  else { document.getElementById('countdownInputs').classList.add('hidden'); document.getElementById('progressBar').classList.add('hidden'); document.getElementById('msDisplay').style.display='block'; }
}));
document.getElementById('settingsToggle').addEventListener('click', () => document.getElementById('settingsPanel').classList.toggle('open'));
document.getElementById('popupToggle').addEventListener('click', () => popup.classList.contains('visible') ? closePopup() : launchPopup());
document.getElementById('launchPopup').addEventListener('click', launchPopup);
document.getElementById('floatClose').addEventListener('click', closePopup);
document.getElementById('floatStart').addEventListener('click', () => isRunning ? pauseTimer() : startTimer());
document.getElementById('floatStop').addEventListener('click', pauseTimer);
document.getElementById('floatReset').addEventListener('click', () => { resetTimer(); laps=[]; });
document.getElementById('soundToggle').addEventListener('click', function() { soundEnabled=!soundEnabled; this.textContent=soundEnabled?'🔔':'🔕'; showToast(soundEnabled?'Sound ON':'Sound OFF'); });
document.getElementById('opacitySlider').addEventListener('input', function() { popupOpacity=this.value/100; document.getElementById('opacityVal').textContent=this.value+'%'; popup.style.opacity=popupOpacity; });
document.getElementById('sizeSlider').addEventListener('input', function() { popupSize=parseInt(this.value); document.getElementById('sizeVal').textContent={1:'Small',2:'Medium',3:'Large'}[popupSize]; applyPopupStyle(); });
document.querySelectorAll('#colorRow .color-swatch').forEach(sw => sw.addEventListener('click', function() { document.querySelectorAll('#colorRow .color-swatch').forEach(s=>s.classList.remove('active')); this.classList.add('active'); popupAccent=this.dataset.color; document.querySelector(':root').style.setProperty('--accent',popupAccent); applyPopupStyle(); }));
document.querySelectorAll('#bgColorRow .color-swatch').forEach(sw => sw.addEventListener('click', function() { document.querySelectorAll('#bgColorRow .color-swatch').forEach(s=>s.classList.remove('active')); this.classList.add('active'); popupBg=this.dataset.bg; applyPopupStyle(); }));
document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  if (e.code==='Space') { e.preventDefault(); isRunning?pauseTimer():startTimer(); }
  if (e.code==='KeyR') resetTimer();
  if (e.code==='KeyL' && mode==='stopwatch') addLap();
  if (e.code==='KeyP') popup.classList.contains('visible')?closePopup():launchPopup();
});

updateDisplays();
applyPopupStyle();
</script>
</body>
</html>
